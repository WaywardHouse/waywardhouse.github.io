    var s = localStorage.getItem('theme');

    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    document.documentElement.dataset.brand = 'wayward';
    window.MAPBOX_TOKEN = "{{< meta mapbox_token >}}";
  })();
</script>
