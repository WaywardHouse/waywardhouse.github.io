<style>
/* ── Book site header ─────────────────────────────────────────────────────
   Sits above Quarto's own book sidebar + chapter nav.
   Deliberately slim — Quarto handles chapter navigation.
   Purpose: brand continuity + a clear route back to wayward.house.
   ──────────────────────────────────────────────────────────────────────── */

.wh-book-header {
  position: sticky;
  top: 0;
  z-index: 1001; /* above Quarto's sidebar z-index (typically 999-1000) */
  height: 2.75rem;
  background: var(--black);
  border-bottom: 1px solid #1c1c1a;
  display: flex;
  align-items: stretch;
}

.wh-book-header__inner {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 0 1.5rem;
  gap: 0;
}

/* ← Back to wayward.house */
.wh-book-header__home {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--font-mono);
  font-size: 0.5625rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
  text-decoration: none;
  padding-right: 1.25rem;
  border-right: 1px solid #252523;
  height: 100%;
  transition: color 0.15s;
}

.wh-book-header__home:hover {
  color: rgba(255,255,255,0.75);
}

.wh-book-header__home::before {
  content: '←';
  font-style: normal;
  color: var(--accent);
  font-size: 0.6875rem;
}

/* Brand mark */
.wh-book-header__brand {
  display: inline-flex;
  align-items: center;
  gap: 0;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 0.9375rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--white);
  text-decoration: none;
  padding: 0 1.25rem;
  border-right: 1px solid #252523;
  height: 100%;
}

.wh-book-header__brand span {
  color: var(--accent);
}

/* Book section label */
.wh-book-header__section {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  padding-left: 1.25rem;
}

/* Current book title (injected by JS from document title) */
.wh-book-header__title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.8125rem;
  color: rgba(255,255,255,0.5);
  padding-left: 0.875rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 28ch;
}

/* Right side: subscribe */
.wh-book-header__right {
  margin-left: auto;
  display: flex;
  align-items: center;
}

.wh-book-header__subscribe {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--accent);
  border: 1px solid var(--accent);
  padding: 0.35rem 0.75rem;
  text-decoration: none;
  transition: background 0.15s;
  white-space: nowrap;
}

.wh-book-header__subscribe:hover {
  background: #b81818;
  border-color: #b81818;
  color: var(--white);
}

/* Push Quarto's own body content down to clear our header.
   Quarto book layouts use different selectors depending on version;
   target the ones that matter. */
body {
  padding-top: 0 !important; /* our header is sticky, not fixed */
}

/* Quarto's sidebar and navbar sit below our header */
#quarto-sidebar,
.quarto-sidebar,
nav.quarto-page-breadcrumbs,
#quarto-content {
  padding-top: 0;
}

@media (max-width: 760px) {
  .wh-book-header__title { display: none; }
  .wh-book-header__section { display: none; }
}

@media (max-width: 480px) {
  .wh-book-header__brand { display: none; }
}
</style>

<header class="wh-book-header">
  <div class="wh-book-header__inner">

    <a href="https://wayward.house" class="wh-book-header__home">
      wayward.house
    </a>

    <a href="https://wayward.house" class="wh-book-header__brand">
      Wayward<span>·</span>House
    </a>

    <span class="wh-book-header__section">Library</span>

    <div class="wh-book-header__right">
      <a href="https://wayward.house/subscribe.html" class="wh-book-header__subscribe">Subscribe</a>
    </div>

  </div>
</header>
