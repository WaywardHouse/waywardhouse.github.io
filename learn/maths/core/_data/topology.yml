# Wayward House Mathematics — Topology Data
# Version 0.1
#
# Single source of truth for the mathematical topology.
# Feeds: bloom visualisation, card explorer, wayfinding nav, chapter schemas.
#
# Layers:
#   1  pre-university   Alberta Gr 7–12
#   2  bridge           Gr 12 into first-year university
#   3  university       U of A MATH 100–209–201 sequence
#   4  engineering      Kreyszig Parts A–G
#   5  discipline       Upper-year engineering mathematics in context

# ── Destination fields ───────────────────────────────────────────────────────

fields:
  - id: eng
    label: Engineering
    color: "#185FA5"
    description: >
      Structural, electrical, mechanical, chemical, and software engineering.
      The most mathematically demanding destination in this map.

  - id: sci
    label: Hard sciences
    color: "#0F6E56"
    description: >
      Physics, chemistry, biology, earth sciences, astronomy.
      Mathematics as the language of natural law.

  - id: biz
    label: Finance and quant
    color: "#854F0B"
    description: >
      Financial modelling, actuarial science, econometrics, quantitative
      trading. Mathematics as the language of risk and value.

  - id: comp
    label: Computing and data
    color: "#534AB7"
    description: >
      Computer science, machine learning, data science, cryptography.
      Mathematics as the language of information and computation.

  - id: geo
    label: Geography and environment
    color: "#993C1D"
    description: >
      Physical geography, GIS, climate science, environmental modelling.
      Mathematics as the language of space and system.


# ── Nodes ────────────────────────────────────────────────────────────────────

nodes:

  # Layer 1 — Pre-university

  - id: num
    label: Numbers and operations
    layer: 1
    volume: 1
    fields: [eng, sci, biz, comp, geo]
    hook: >
      The bedrock. Every other node in this map stands on this one.
    stroud: null
    kreyszig: null

  - id: ratio
    label: Ratio and proportion
    layer: 1
    volume: 1
    fields: [eng, sci, biz, geo]
    hook: >
      Scale, dilution, gear ratios, map reading — the same structure
      in different clothes.

  - id: pct
    label: Percent and rates
    layer: 1
    volume: 1
    fields: [biz, sci, eng, geo]
    hook: >
      Interest, efficiency, growth, decay — how the world reports change.

  - id: integers
    label: Integers and signed arithmetic
    layer: 1
    volume: 1
    fields: [sci, eng, comp, biz]
    hook: >
      Debt, temperature, charge, direction. The number line in both
      directions is the first abstraction that maps the real world.

  - id: fractions
    label: Fractions and decimals
    layer: 1
    volume: 1
    fields: [eng, sci, biz, geo]
    hook: >
      Parts of wholes. The arithmetic of measurement and division.

  - id: stat_basic
    label: Statistics and probability
    layer: 1
    volume: 1
    fields: [sci, biz, comp, geo]
    hook: >
      Reasoning honestly under uncertainty. Runs as a thread through
      every volume in the series.

  - id: linear_eq
    label: Linear equations
    layer: 1
    volume: 2
    fields: [eng, sci, biz, comp, geo]
    hook: >
      You know the relationship, you're missing one value. Every field
      has a different name for this. The tool is the same.
    chapter_ref: "vol-02/01-linear-equations.qmd"

  - id: inequalities
    label: Inequalities and systems
    layer: 1
    volume: 2
    fields: [biz, eng, comp]
    hook: >
      Constraints and feasibility. Optimisation lives here.

  - id: patterns
    label: Patterns and sequences
    layer: 1
    volume: 2
    fields: [biz, comp, sci, eng]
    hook: >
      Anything that accumulates or repeats. The seed of calculus.

  - id: graphing
    label: Graphing relations
    layer: 1
    volume: 2
    fields: [eng, sci, biz, comp]
    hook: >
      Every equation is a line waiting to be drawn. The picture and the
      algebra are the same relationship in two different languages.
    chapter_ref: "vol-02/04-graphing-relations.qmd"

  - id: geom
    label: Geometry and measurement
    layer: 1
    volume: 3
    fields: [eng, geo, sci]
    hook: >
      Space, shape, and size — the language of the physical world.

  - id: trig
    label: Trigonometry
    layer: 1
    volume: 3
    fields: [eng, sci, geo, comp]
    hook: >
      Rotation, oscillation, navigation. Anything involving angles.

  - id: poly
    label: Polynomials and factoring
    layer: 1
    volume: 3
    fields: [eng, sci, comp, biz]
    hook: >
      Curved relationships. Projectiles, pressure vessels, option pricing.

  - id: func
    label: Functions and relations
    layer: 1
    volume: 3
    fields: [eng, sci, biz, comp, geo]
    hook: >
      Given this, produce that. The fundamental unit of modelling.

  - id: exp_log
    label: Exponents and logarithms
    layer: 1
    volume: 4
    fields: [sci, biz, eng, comp]
    hook: >
      Exponential growth and decay. Pandemics, interest, signal strength,
      radioactive decay.
    chapter_ref: "vol-04/01-exponents-logarithms.qmd"

  - id: systems
    label: Systems of equations
    layer: 1
    volume: 4
    fields: [eng, sci, biz, comp]
    hook: >
      Two unknowns, two constraints. The simplest case of a problem
      that scales all the way to machine learning.
    chapter_ref: "vol-04/03-systems-matrices.qmd"

  - id: seq_series
    label: Sequences and series
    layer: 1
    volume: 4
    fields: [biz, comp, sci, eng]
    hook: >
      Anything that accumulates step by step. The bridge to calculus.

  - id: complex_seed
    label: Complex numbers
    layer: 1
    volume: 4
    fields: [eng, sci, comp]
    hook: >
      What happens when a polynomial has no real solutions? The answer
      opens a new number system that turns out to be essential.

  - id: stat_advanced
    label: Probability and data
    layer: 1
    volume: 6
    fields: [sci, biz, comp, geo]
    hook: >
      Distributions, inference, hypothesis testing. Statistics at the
      level where it becomes genuinely useful.


  # Layer 2 — Bridge

  - id: limits
    label: Limits and continuity
    layer: 2
    volume: 5
    fields: [eng, sci, comp, biz]
    hook: >
      What does a function approach as you get arbitrarily close to a
      point? The conceptual threshold between algebra and analysis.

  - id: proof
    label: Proof and mathematical reasoning
    layer: 2
    volume: 5
    fields: [comp, sci, eng]
    hook: >
      The first genuine shock of university mathematics. Not computing
      an answer but establishing that something must be true.

  - id: parametric_polar
    label: Parametric and polar
    layer: 2
    volume: 5
    fields: [eng, sci, geo]
    hook: >
      Describing curves that aren't functions in the standard sense.
      Essential for mechanics, orbital dynamics, and fluid flow.


  # Layer 3 — University (U of A sequence)

  - id: diff_calc
    label: Differential calculus
    layer: 3
    volume: 5
    fields: [eng, sci, biz, comp]
    hook: >
      The instantaneous rate of change. Every dynamic system in
      engineering and science is described in its language.
    uofa: "MATH 100"
    kreyszig: "Ch 1–2 (background)"

  - id: int_calc
    label: Integral calculus
    layer: 3
    volume: 5
    fields: [eng, sci, biz, comp]
    hook: >
      Accumulation. Area, volume, work, probability — all integrals.
    uofa: "MATH 101"

  - id: lin_alg
    label: Applied linear algebra
    layer: 3
    volume: 7
    fields: [eng, sci, comp]
    hook: >
      Matrices, eigenvalues, eigenvectors. The geometry of systems
      with many variables.
    uofa: "MATH 102"
    kreyszig: "Ch 7–8"

  - id: multivariable
    label: Multivariable calculus
    layer: 3
    volume: 7
    fields: [eng, sci, geo]
    hook: >
      Partial derivatives, multiple integrals, vector fields. Functions
      of more than one variable — how most real systems actually work.
    uofa: "MATH 209"
    kreyszig: "Ch 9–10"

  - id: odes
    label: Ordinary differential equations
    layer: 3
    volume: 7
    fields: [eng, sci, biz, comp]
    hook: >
      A relationship between a quantity and its own rate of change.
      The mathematical language of dynamics.
    uofa: "MATH 201"
    kreyszig: "Ch 1–6"


  # Layer 4 — Engineering mathematics (Kreyszig)

  - id: laplace
    label: Laplace transforms
    layer: 4
    volume: 7
    fields: [eng, sci, comp]
    hook: >
      Converts differential equations into algebra. The working
      language of control engineering and signal processing.
    kreyszig: "Ch 6"
    stroud: "Programmes 2–4"

  - id: lin_alg_advanced
    label: Matrix eigenvalue problems
    layer: 4
    volume: 7
    fields: [eng, sci, comp]
    hook: >
      Eigenvalues reveal the natural modes of a system. Structural
      resonance, quantum states, Google's PageRank — all eigenproblems.
    kreyszig: "Ch 8"

  - id: vector_calc
    label: Vector differential calculus
    layer: 4
    volume: 7
    fields: [eng, sci, geo]
    hook: >
      Grad, div, curl. The mathematical language of fields — electric,
      magnetic, gravitational, fluid.
    kreyszig: "Ch 9"

  - id: vector_integral
    label: Vector integral calculus
    layer: 4
    volume: 7
    fields: [eng, sci]
    hook: >
      Green's theorem, Stokes' theorem, the Divergence theorem. The
      fundamental theorems of multidimensional calculus.
    kreyszig: "Ch 10"

  - id: fourier_series
    label: Fourier series
    layer: 4
    volume: 7
    fields: [eng, sci, comp]
    hook: >
      Any periodic signal is a sum of sines and cosines. The foundation
      of signal processing, acoustics, and image compression.
    kreyszig: "Ch 11"
    stroud: "Programmes 7–8"

  - id: fourier_transform
    label: Fourier transform
    layer: 4
    volume: 7
    fields: [eng, sci, comp]
    hook: >
      Extends Fourier series to non-periodic functions. The FFT is one
      of the most important algorithms ever discovered.
    kreyszig: "Ch 11"
    stroud: "Programme 9"

  - id: pdes
    label: Partial differential equations
    layer: 4
    volume: 7
    fields: [eng, sci, geo]
    hook: >
      Heat, waves, and diffusion — all PDEs. The mathematical language
      of physical phenomena distributed in space and time.
    kreyszig: "Ch 12"
    stroud: "Programme 21"

  - id: complex_analysis
    label: Complex analysis
    layer: 4
    volume: 7
    fields: [eng, sci, comp]
    hook: >
      Functions of a complex variable. Cauchy's theorem, residue
      integration, conformal mapping. Surprisingly practical.
    kreyszig: "Ch 13–18"
    stroud: "Programmes 29–31"

  - id: numerics
    label: Numerical methods
    layer: 4
    volume: 7
    fields: [eng, sci, comp, biz]
    hook: >
      When the analytical solution doesn't exist or isn't useful.
      The bridge between the mathematics and what computers actually do.
    kreyszig: "Ch 19–21"
    stroud: "Programme 1, 13"

  - id: optimisation
    label: Optimisation and graphs
    layer: 4
    volume: 7
    fields: [eng, biz, comp]
    hook: >
      Linear programming, network flows, combinatorial optimisation.
      Finding the best solution in a constrained space.
    kreyszig: "Ch 22–23"
    stroud: "Programme 32"

  - id: prob_stats
    label: Probability and mathematical statistics
    layer: 4
    volume: 7
    fields: [sci, biz, comp, geo]
    hook: >
      Probability distributions, hypothesis testing, regression.
      The mathematics of inference from data.
    kreyszig: "Ch 24–25"


  # Layer 5 — Discipline-facing upper-year engineering mathematics

  - id: control_feedback
    label: Control, feedback, and stability
    layer: 5
    volume: 8
    fields: [eng, comp, sci]
    hook: >
      Turns dynamic models into decisions about stability, transient
      response, robustness, and feedback design.

  - id: discrete_systems
    label: Discrete-time systems and signal processing
    layer: 5
    volume: 8
    fields: [eng, comp, sci]
    hook: >
      Sampled systems, recurrences, filters, and spectra. The mathematics
      of sensors, DSP, embedded systems, and experimental data streams.

  - id: continuum_transport
    label: Continuum mechanics and transport
    layer: 5
    volume: 8
    fields: [eng, sci, geo]
    hook: >
      Stress, strain, flux, diffusion, and conservation laws expressed as
      local field statements with global consequences.

  - id: computational_methods
    label: Computational methods for engineering models
    layer: 5
    volume: 8
    fields: [eng, comp, geo]
    hook: >
      Meshes, weak forms, conservation, and solver structure — the route
      from governing equation to trustworthy simulation.

  - id: estimation_inverse
    label: Estimation, inverse problems, and filtering
    layer: 5
    volume: 8
    fields: [eng, comp, geo, sci]
    hook: >
      Recovering hidden states, parameters, and histories from noisy data.
      Central to control, sensing, remote sensing, and data assimilation.

  - id: reliability
    label: Reliability, stochastic systems, and quality
    layer: 5
    volume: 8
    fields: [eng, biz, comp]
    hook: >
      Failure rates, queues, defects, and operational variability. The
      mathematics of engineering risk once randomness is structural.

  - id: nonlinear_optim
    label: Nonlinear optimisation for design and operations
    layer: 5
    volume: 8
    fields: [eng, biz, comp]
    hook: >
      Real design spaces curve. Nonlinear constraints and tradeoffs turn
      "best" into a geometric and computational question.


